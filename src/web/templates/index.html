<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulCore 3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0c0e; --bg-secondary: #111417; --bg-tertiary: #1a1e24;
            --border: #2a2f38; --text: #e0e0e0; --text-muted: #888;
            --accent: #7aa2f7; --success: #9ece6a; --error: #f7768e;
            --header-height: 60px; --footer-height: 40px; --sidebar-width: 280px;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg-primary); color: var(--text); height: 100vh; overflow: hidden; }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .header { height: var(--header-height); background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .logo { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
        .status-badge { display: flex; gap: 10px; }
        .badge { padding: 4px 10px; background: var(--bg-tertiary); border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .main { flex: 1; display: flex; min-height: 0; overflow: hidden; }
        .left-panel { width: var(--sidebar-width); background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .center-panel { flex: 1; display: flex; flex-direction: column; min-width: 300px; background: var(--bg-primary); overflow: hidden; }
        .right-panel { width: var(--sidebar-width); background: var(--bg-secondary); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
        .panel-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .panel-section:first-child { border-bottom: 1px solid var(--border); }
        .panel-header { padding: 12px 15px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); flex-shrink: 0; }
        .panel-content { flex: 1; overflow-y: auto; padding: 10px; }
        .conv-list { display: flex; flex-direction: column; gap: 8px; }
        .conv-item { padding: 10px; background: var(--bg-tertiary); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .conv-item:hover { background: var(--border); }
        .conv-item.active { border-left: 3px solid var(--accent); background: var(--border); }
        .conv-title { font-weight: 500; margin-bottom: 4px; }
        .conv-preview { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); }
        .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0 4px; }
        .delete-btn:hover { color: var(--error); }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 12px 20px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .chat-header h3 { font-size: 1rem; font-weight: 500; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 16px; }
        .message.user { background: #1e2a3a; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.assistant { background: var(--bg-tertiary); align-self: flex-start; border-bottom-left-radius: 4px; }
        .sender { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
        .content { font-size: 0.9rem; line-height: 1.4; }
        .time { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; text-align: right; }
        .chat-input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-shrink: 0; }
        .chat-input-area textarea { flex: 1; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-size: 0.9rem; resize: none; font-family: inherit; }
        .chat-input-area textarea:focus { outline: none; border-color: var(--accent); }
        .send-btn { width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 50%; color: white; font-size: 1.2rem; cursor: pointer; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .metric-group { margin-bottom: 20px; }
        .metric-group-title { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
        .metric { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; }
        .metric label { color: var(--text-muted); }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; width: 100%; }
        .btn-primary:hover { opacity: 0.9; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; }
        .empty-icon { font-size: 2rem; margin-bottom: 10px; }
        .footer { height: var(--footer-height); background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
        .connection-status { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.connected { background: var(--success); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        const store = {
            conversations: ref([
                { id: 1, title: 'Első beszélgetés', last_message: 'Helló!', updated_at: Date.now() - 3600000, messages: [
                    { id: 1, role: 'user', content: 'Helló!', timestamp: Date.now() - 7200000 },
                    { id: 2, role: 'assistant', content: 'Szia! Hogy segíthetek?', timestamp: Date.now() - 7190000 },
                    { id: 3, role: 'user', content: 'Mi újság?', timestamp: Date.now() - 7180000 },
                    { id: 4, role: 'assistant', content: 'Minden rendben, te hogy vagy?', timestamp: Date.now() - 7170000 }
                ] },
                { id: 2, title: 'Második beszélgetés', last_message: 'Hogy vagy?', updated_at: Date.now() - 7200000, messages: [] }
            ]),
            currentConversationId: ref(1),
            modules: ref({
                orchestrator: 'running', king: 'ready', queen: 'ready', jester: 'running',
                scribe: 'running', valet: 'ready', sentinel: 'running', heartbeat: 'running'
            })
        };

        const app = createApp({
            setup() {
                const conversations = store.conversations;
                const currentConversationId = store.currentConversationId;
                const modules = store.modules;
                const inputMessage = ref('');
                const currentTime = ref(new Date().toLocaleTimeString());
                const messagesContainer = ref(null);

                const currentConversation = computed(() => {
                    return conversations.value.find(c => c.id === currentConversationId.value);
                });

                const messages = computed(() => {
                    const conv = currentConversation.value;
                    return conv ? conv.messages : [];
                });

                const formatRelativeTime = (ts) => {
                    const diff = Math.floor((Date.now() - ts) / 60000);
                    if (diff < 1) return 'most';
                    if (diff < 60) return diff + ' perce';
                    if (diff < 1440) return Math.floor(diff / 60) + ' órája';
                    return new Date(ts).toLocaleDateString();
                };

                const formatTime = (ts) => new Date(ts).toLocaleTimeString();
                const formatModuleName = (name) => name.split('_').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');

                const scrollToBottom = () => {
                    nextTick(() => {
                        if (messagesContainer.value) messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
                    });
                };

                const createNewConversation = () => {
                    const title = prompt('Beszélgetés címe');
                    if (title) {
                        conversations.value.unshift({
                            id: Date.now(), title: title, last_message: null, updated_at: Date.now(), messages: []
                        });
                        currentConversationId.value = conversations.value[0].id;
                    }
                };

                const selectConversation = (id) => {
                    currentConversationId.value = id;
                    scrollToBottom();
                };

                const deleteConversation = (id) => {
                    if (confirm('Biztosan törli?')) {
                        const idx = conversations.value.findIndex(c => c.id === id);
                        if (idx !== -1) conversations.value.splice(idx, 1);
                        if (currentConversationId.value === id && conversations.value.length > 0) {
                            currentConversationId.value = conversations.value[0].id;
                        }
                    }
                };

                const sendMessage = () => {
                    const text = inputMessage.value.trim();
                    if (!text || !currentConversationId.value) return;

                    const conv = currentConversation.value;
                    if (!conv) return;

                    conv.messages.push({ id: Date.now(), role: 'user', content: text, timestamp: Date.now() });
                    conv.last_message = text;
                    conv.updated_at = Date.now();
                    inputMessage.value = '';
                    scrollToBottom();

                    setTimeout(() => {
                        conv.messages.push({ id: Date.now() + 1, role: 'assistant', content: 'Válasz erre: "' + text + '"', timestamp: Date.now() });
                        scrollToBottom();
                    }, 500);
                };

                setInterval(() => { currentTime.value = new Date().toLocaleTimeString(); }, 1000);
                onMounted(scrollToBottom);

                return {
                    conversations, currentConversationId, currentConversation, messages, modules,
                    inputMessage, currentTime, messagesContainer, formatRelativeTime, formatTime,
                    formatModuleName, createNewConversation, selectConversation, deleteConversation, sendMessage
                };
            },
            template: `
                <div class="app">
                    <div class="header">
                        <div class="logo">✦ SOULCORE 3.0</div>
                        <div class="status-badge">
                            <div class="badge">💓 2m 4s</div>
                            <div class="badge">👑 ready</div>
                        </div>
                    </div>
                    <div class="main">
                        <div class="left-panel">
                            <div class="panel-section">
                                <div class="panel-header">BESZÉLGETÉSEK</div>
                                <div class="panel-content">
                                    <button class="btn-primary" @click="createNewConversation" style="margin-bottom:12px">+ Új beszélgetés</button>
                                    <div class="conv-list">
                                        <div v-for="conv in conversations" :key="conv.id" class="conv-item" :class="{ active: currentConversationId === conv.id }" @click="selectConversation(conv.id)">
                                            <div class="conv-title">{{ conv.title }}</div>
                                            <div class="conv-preview" v-if="conv.last_message">{{ conv.last_message }}</div>
                                            <div class="conv-meta"><span>{{ formatRelativeTime(conv.updated_at) }}</span><button class="delete-btn" @click.stop="deleteConversation(conv.id)">🗑️</button></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="panel-section">
                                <div class="panel-header">RENDSZERÁLLAPOT</div>
                                <div class="panel-content">
                                    <div class="metric-group"><div class="metric-group-title">Rendszer</div><div class="metric"><label>🔧 Státusz</label><span>fut</span></div><div class="metric"><label>💓 Üzemidő</label><span>2m 4s</span></div></div>
                                    <div class="metric-group"><div class="metric-group-title">Király</div><div class="metric"><label>👑 Státusz</label><span>ready</span></div><div class="metric"><label>😊 Hangulat</label><span>neutral</span></div></div>
                                    <div class="metric-group"><div class="metric-group-title">Modulok</div><div v-for="(status, name) in modules" :key="name" class="metric"><label>{{ formatModuleName(name) }}</label><span class="status-badge" :class="status">{{ status }}</span></div></div>
                                </div>
                            </div>
                        </div>
                        <div class="center-panel">
                            <div class="chat-container">
                                <div class="chat-header"><h3>{{ currentConversation ? currentConversation.title : 'Új beszélgetés' }}</h3></div>
                                <div class="chat-messages" ref="messagesContainer">
                                    <div v-if="messages.length === 0" class="empty-state"><div class="empty-icon">💬</div><div>Kezdjen el beszélgetni!</div></div>
                                    <div v-for="msg in messages" :key="msg.id" class="message" :class="msg.role"><div class="sender">{{ msg.role === 'user' ? 'Te' : 'Kópé' }}</div><div class="content">{{ msg.content }}</div><div class="time">{{ formatTime(msg.timestamp) }}</div></div>
                                </div>
                                <div class="chat-input-area"><textarea v-model="inputMessage" @keydown.enter.exact.prevent="sendMessage" placeholder="Írja be üzenetét..." rows="1"></textarea><button class="send-btn" @click="sendMessage" :disabled="!inputMessage.trim() || !currentConversationId">📤</button></div>
                            </div>
                        </div>
                        <div class="right-panel"><div class="panel-section"><div class="panel-header">MODULOK</div><div class="panel-content"><div v-for="(status, name) in modules" :key="name" class="metric"><label>{{ formatModuleName(name) }}</label><span class="status-badge" :class="status">{{ status }}</span></div></div></div></div>
                    </div>
                    <div class="footer"><div class="footer-left">v3.0.0</div><div class="connection-status"><span class="status-dot connected"></span><span>Kapcsolódva</span></div><div>{{ currentTime }}</div></div>
                </div>
            `
        });

        app.mount('#app');
    </script>
</body>
</html>
