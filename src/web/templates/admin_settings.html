{% extends "base.html" %}
{% block title %}Rendszerbeállítások{% endblock %}
{% block content %}
<div id="settings-app">
    <div class="admin-container">
        <div class="admin-sidebar">
            <div class="admin-menu">
                <a href="#general" class="admin-menu-item">Általános</a>
                <a href="#model" class="admin-menu-item">Modell paraméterek</a>
                <a href="#system" class="admin-menu-item">Rendszer</a>
                <a href="#memory" class="admin-menu-item">Memória</a>
            </div>
        </div>
        <div class="admin-content">
            <div v-for="(value, key) in settings" class="setting-item">
                <label>{{ key }}</label>
                <input type="text" v-model="settings[key]" @change="updateSetting(key)">
            </div>
        </div>
    </div>
</div>
{% endblock %}
