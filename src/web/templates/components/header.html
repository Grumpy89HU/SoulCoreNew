<div class="header">
    <div class="title">
        <span>✦</span> SOULCORE 3.0 <span>✦</span>
    </div>
    <div class="status-badge">
        <div class="badge" :class="{'heartbeat': heartbeatRunning, 'paused': !heartbeatRunning}">
            <span>💓</span> {{ formatUptime(heartbeat.uptime_seconds) }}
        </div>
        <div class="badge" :class="kingState.status == 'ready' ? 'heartbeat' : 'paused'">
            <span>👑</span> <span v-text="kingState.status || '???'"></span>
        </div>
    </div>
</div>
