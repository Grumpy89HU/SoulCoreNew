# SoulCore 3.0 - Konfiguráció
# ============================================================

# Rendszer
system:
  name: "SoulCore"
  version: "3.0"
  environment: "development"  # development / production
  identity_file: "config/identity.inf"

# ========== VAULT KONFIGURÁCIÓ (Neo4j + Qdrant) ==========
vault:
  # Graph-Vault (Neo4j)
  neo4j:
    enabled: true
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "soulcore2026"
    database: "neo4j"
    init_schema: true
    max_connection_pool_size: 10
    connection_timeout: 30

  # Vector-Vault (Qdrant)
  qdrant:
    enabled: true
    host: "localhost"
    port: 6333
    grpc_port: 6334
    vector_size: 1024
    collections:
      - name: "global_knowledge"
        vector_size: 1024
        distance: "Cosine"
      - name: "personal_memories"
        vector_size: 1024
        distance: "Cosine"
      - name: "conversations"
        vector_size: 1024
        distance: "Cosine"
    timeout: 30

  # Embedding modell
  embedding:
    use_king_model: true
    model: ""
    batch_size: 16
    cache_embeddings: true

# ========== MODULOK ==========
modules:
  heartbeat:
    enabled: true
    interval: 1.0
    proactive:
      enabled: true
      min_idle_hours: 2
      max_idle_hours: 8
      once_per_day: true
      reminders: true
      check_interval: 300
      chance: 0.3
      topics: []

  router:
    enabled: true
    zmq_enabled: false
    zmq_port: 5555
    heartbeat_timeout: 3.0

  web:
    enabled: true
    host: "0.0.0.0"
    port: 5000
    debug: false
    socketio:
      ping_timeout: 60
      ping_interval: 25
      max_http_buffer_size: 10000000

  gateway:
    enabled: false
    max_external_connections: 5
    message_queue_size: 100
    trust_score_decay: 0.95
    min_trust_for_response: 300
    max_tokens_per_entity: 10000
    enable_filter: true
    enable_queue: true
    response_timeout: 30
    external_entities:
      - name: "origó"
        trust_score: 800
        api_endpoint: ""
        description: "SoulCore partner"
      - name: "openai"
        trust_score: 100
        api_endpoint: ""
        enabled: false

  eyecore:
    enabled: false
    enable_ocr: true
    enable_object_detection: false
    enable_face_detection: false
    max_image_size: 1920
    cache_results: true
    cache_ttl: 3600
    default_language: "hun"
    save_uploaded: false
    upload_path: "data/uploads"

  sentinel:
    enabled: true
    check_interval: 2.0
    temp_warning: 75
    temp_critical: 85
    vram_warning: 90
    vram_critical: 95
    emergency_unload_temp: 85
    throttle_temp: 80
    throttle_factor: 0.5
    auto_unload_priority: 3
    log_history: 100
    enable_emergency_protocol: true
    recovery_after_seconds: 300
    max_consecutive_critical: 3
    enable_throttle: true
    enable_dynamic_swap: true
    enable_fragmentation_shield: true
    temperature_trend_window: 60
    temperature_rise_warning: 5
    vram_reserve_mb: 512
    gpu_devices:
      - index: 0
        name: "RTX 5060 Ti"
        max_temp: 85
      - index: 1
        name: "RTX 5060 Ti"
        max_temp: 85
    # Modellek VRAM igénye (MB) - a config-ból olvassa a Sentinel
    model_vram_estimates:
      default: 2000          # alapértelmezett, ha nincs más beállítás
      king: 8000             # 27B modell (Gemma 27B)
      queen: 4000            # 7B modell (Qwen 7B)
      scribe: 2000           # 1B modell
      jester: 1500           # 1B modell (TinyLlama)
      valet: 1500            # embedding modell
      vision: 4000           # Moondream vagy Llava
      # Konkrét modell fájlnevekhez is lehet beállítás
      "google_gemma-3-12b-it-qat-Q4_K_M.gguf": 8000
      "Qwen2.5-Omni-7B-UD-Q5_K_XL.gguf": 4000

  blackbox:
    enabled: true
    log_dir: "logs"
    max_log_size: 104857600
    max_log_age: 30
    compress: true
    log_level: "info"
    trace_token_level: false
    buffer_size: 10000
    auto_flush: true
    flush_interval: 5.0
    include_payload: true
    anonymize: false

  sandbox:
    enabled: true
    use_docker: false
    timeout: 30
    max_memory: 536870912
    max_cpu_time: 10
    max_output_size: 102400
    enable_filesystem: false
    enable_network: false
    temp_dir: "/tmp/soulcore_sandbox"
    allowed_imports:
      - "math"
      - "json"
      - "datetime"
      - "re"
      - "collections"

# ========== ADATBÁZIS ==========
database:
  path: "data/soulcore.db"
  auto_backup: true
  backup_interval: 86400
  backup_path: "data/backups"
  max_backups: 10

# ========== MEMÓRIA ==========
memory:
  scratchpad_max_entries: 1000
  short_term_minutes: 5
  cleanup_interval: 3600
  auto_archive_days: 90
  forget_after_days: 30
  importance_threshold: 0.7

# ========== FELHASZNÁLÓ ==========
user:
  name: "user"
  language: "en"
  role: "admin"
  preferences:
    theme: "dark"
    notifications: true
    auto_save: true

# ========== NYELVEK ==========
i18n:
  default_language: "en"
  supported_languages:
    - code: "en"
      name: "English"
      fallback: "en"
    - code: "hu"
      name: "Magyar"
      fallback: "en"
  locale_dir: "src/i18n/locales"
  dynamic_translations: true
  cache_translations: true

# ========== AGENSEK ==========
agents:
  king:
    enabled: true
    model: "models/google_gemma-3-12b-it-qat-Q4_K_M.gguf"
    n_gpu_layers: -1
    n_ctx: 8192
    personality: "curious, loyal, sovereign, witty"
    style: "default"
    generation_params:
      max_tokens: 512
      temperature: 0.7
      top_p: 0.9
      top_k: 40
      repeat_penalty: 1.1

  jester:
    enabled: true
    max_response_time: 30.0
    max_error_rate: 0.5
    max_consecutive_errors: 5
    satire_enabled: true
    satire_intensity: 0.7
    enable_cycle_detection: true
    enable_perplexity_monitoring: false
    enable_identity_reset: true

  scribe:
    enabled: true
    intent_threshold: 0.7
    enable_ner: true
    entity_patterns:
      person: ["(?:Mr\\.|Mrs\\.|Ms\\.|Dr\\.)?\\s*([A-Z][a-z]+)"]
      date: ["\\d{4}-\\d{2}-\\d{2}", "\\d{2}\\.\\d{2}\\.\\d{4}"]
      path: ["/[a-zA-Z0-9_/.-]+"]

  valet:
    enabled: true
    max_context_tokens: 1500
    max_recent_messages: 5
    summary_length: 200
    context_compression: true
    enable_rag: true
    vector_search_limit: 5
    graph_search_limit: 3
    similarity_threshold: 0.7
    emotional_weight: 0.3
    enable_tracking: true
    max_tracking_items: 1000
    enable_validation: true
    important_threshold: 0.7
    forget_after_days: 30
    enable_auto_archive: true
    archive_after_days: 90

  queen:
    enabled: false
    require_proof: true
    max_facts: 10
    temperature: 0.1
    max_tokens: 512
    use_model: false
    model: "models/Qwen2.5-Omni-7B-UD-Q5_K_XL.gguf"
    n_gpu_layers: -1
    n_ctx: 4096
    cot_enabled: true
    cot_max_steps: 5
    contradiction_detection: true

# ========== WEB ÉS API ==========
web:
  enabled: true
  host: "0.0.0.0"
  port: 5000
  static_enabled: true
  static_host: "0.0.0.0"
  static_port: 8000
  web_root: null

api:
  enabled: true
  host: "0.0.0.0"
  port: 5001
  ws_port: 5002

# ========== RAG 2.1 KOMPONENSEK ==========

# Embedding beállítások
embedding:
  enabled: true
  type: "sentence-transformers"
  model: "all-MiniLM-L6-v2"
  cache_ttl: 86400
  fallback_size: 384

# Reranker beállítások
reranker:
  enabled: false
  type: "cross-encoder"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  cache_ttl: 86400

# Search beállítások
search:
  enabled: true
  search_type: "internal"
  cache_ttl: 86400
  max_cache_entries: 1000

# ========== RENDSZERBEÁLLÍTÁSOK ==========
system_settings:
  performance:
    enable_metrics: true
    metrics_interval: 60
    enable_profiling: false

  security:
    enable_audit_log: true
    enable_rate_limiting: true
    rate_limit:
      per_user: 60
      per_ip: 30
    max_prompt_length: 4096
    max_response_length: 8192
    allowed_origins:
      - "http://localhost:5000"
      - "http://127.0.0.1:5000"

  development:
    debug_mode: false
    hot_reload: false
    test_mode: false
    mock_responses: false